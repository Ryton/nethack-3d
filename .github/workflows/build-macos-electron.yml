name: Build macOS Electron

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Fallback checkout via tarball
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          temp_dir="$(mktemp -d)"
          archive_path="${temp_dir}/repo.tar.gz"
          curl -fL \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 5 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            -o "${archive_path}"
          tar -xzf "${archive_path}" -C "${temp_dir}"
          src_dir="$(find "${temp_dir}" -mindepth 1 -maxdepth 1 -type d | head -n1)"
          rm -rf "${GITHUB_WORKSPACE:?}/"*
          cp -a "${src_dir}/." "${GITHUB_WORKSPACE}/"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS desktop artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          VITE_NH3D_BUILD_COMMIT_SHA: ${{ github.sha }}
        run: npm run electron:dist:mac -- --universal

      - name: Upload macOS workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nethack-3d-macos-universal
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap

      - name: Publish macOS release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --generate-notes
          fi
          gh release upload "${tag}" release/*.dmg release/*.zip release/*.yml release/*.blockmap --clobber
