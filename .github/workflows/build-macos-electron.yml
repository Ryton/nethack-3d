name: Build macOS Electron

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to upload the DMG to. Defaults to <package version>."
        required: false
        type: string
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Fallback checkout via tarball
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          temp_dir="$(mktemp -d)"
          archive_path="${temp_dir}/repo.tar.gz"
          curl -fL \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 5 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            -o "${archive_path}"
          tar -xzf "${archive_path}" -C "${temp_dir}"
          src_dir="$(find "${temp_dir}" -mindepth 1 -maxdepth 1 -type d | head -n1)"
          rm -rf "${GITHUB_WORKSPACE:?}/"*
          cp -a "${src_dir}/." "${GITHUB_WORKSPACE}/"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS desktop artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          VITE_NH3D_BUILD_COMMIT_SHA: ${{ github.sha }}
        run: npm run electron:dist:mac -- --universal

      - name: Resolve release target
        id: release_target
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          package_tag="${package_version}"
          requested_tag="$(printf '%s' "${WORKFLOW_RELEASE_TAG:-}" | xargs)"
          release_tag="${requested_tag:-$package_tag}"
          should_publish=false

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            should_publish=true
          elif gh release view "${release_tag}" >/dev/null 2>&1; then
            should_publish=true
          elif gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${release_tag}" >/dev/null 2>&1; then
            should_publish=true
          fi

          {
            echo "package_version=${package_version}"
            echo "release_tag=${release_tag}"
            echo "should_publish=${should_publish}"
          } >> "${GITHUB_OUTPUT}"

          if [[ "${should_publish}" == "true" ]]; then
            echo "Will publish DMG to release tag ${release_tag}"
          else
            echo "No matching release tag found for ${release_tag}; DMG will only be uploaded as a workflow artifact."
          fi

      - name: Upload macOS workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nethack-3d-macos-dmg
          if-no-files-found: error
          path: release/*.dmg

      - name: Publish macOS release assets
        if: steps.release_target.outputs.should_publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.release_target.outputs.release_tag }}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --generate-notes
          fi
          gh release upload "${tag}" release/*.dmg --clobber
